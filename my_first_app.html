<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Chaos Checkers</title>
    <style>
        /* #comment: Page reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* #comment: Full page styling */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #111111, #1f1f1f, #2c2c2c);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* #comment: Main card container */
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(8px);
        }

        /* #comment: App title */
        h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #ffffff;
        }

        /* #comment: Description text */
        p {
            font-size: 1rem;
            line-height: 1.6;
            color: #dddddd;
            margin-bottom: 30px;
        }

        /* #comment: Download button styling */
        .download-btn {
            display: inline-block;
            background: #22c55e;
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 15px 30px;
            border-radius: 12px;
            transition: 0.3s ease;
            box-shadow: 0 6px 18px rgba(34, 197, 94, 0.35);
        }

        /* #comment: Button hover effect */
        .download-btn:hover {
            background: #16a34a;
            transform: translateY(-2px);
        }

        /* #comment: Small footer text */
        .footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #bbbbbb;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- #comment: App heading -->
        <h1>Chaos Checkers</h1>

        <!-- #comment: Short app description -->
        <p>
            Download and test my checker game for Android.
            Tap the button below to download the APK and install it on your phone.
        </p>

        <!-- #comment: Direct download link -->
        <a 
            class="download-btn"
            href="https://github.com/boyoftime/TEMP-DATA/raw/b6c3765c13163bfc8499d59dd8b26807338b596d/chaos-checkers-signed.apk"
            download
        >
            Download APK
        </a>

        <!-- #comment: Footer text -->
        <div class="footer">
            Made for sharing with friends for testing and gameplay.
        </div>
    </div>
</body>
</html>
